<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #myIframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>

    <iframe id="myIframe" src="./Home/index.html"></iframe>
    <script>
        window.addEventListener("resize", function () {
            var myIframe = document.getElementById("myIframe");
            myIframe.style.width = window.innerWidth + "px";
            myIframe.style.height = window.innerHeight + "px";
        });
    </script>
</body>

</html>
