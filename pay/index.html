<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="show"></div>
    <div id="img"></div>
    <button onclick="openwx()">打开微信</button>
    <script>
        var showDiv = document.getElementById("show");
        var imgTag = document.getElementById("img");
        function isWeChatBrowser() {
            var ua = navigator.userAgent.toLowerCase();
            //showDiv.innerHTML = ua;
            return ua.indexOf('micromessenger') !== -1;

        }
        function openwx() {
            open = function () {
                var url = window.location.href;
                setTimeout(function () { window.location.href = "weixin://" }, 1000);
            }
            open()
        }
        // 判断是否为支付宝浏览器
        function isAlipayBrowser() {
            var ua = navigator.userAgent.toLowerCase();
            //showDiv.innerHTML = ua;
            return ua.indexOf('alipay') !== -1;
        }

        // 判断扫码类型并识别收款码
        function scanQRCode() {
            if (isWeChatBrowser()) {
                // 微信扫码，识别微信收款码的逻辑
                console.log('微信扫码');
                alert('微信扫码')
                //window.location.href = 'wxp://f2f0jv_eMj2I9m58FXz9iVdt0NDeOYDsKwFdN6Y4ZzwlKMSrm2Cp8DtI-cp-cT9fxKxq';
                imgTag.innerHTML = "<img src='https://cdn.jsdelivr.net/gh/smallfawn/Note@main/Images/clwx.png'>";

                // TODO: 识别微信收款码的处理代码
            } else if (isAlipayBrowser()) {
                // 支付宝扫码的逻辑
                console.log('支付宝扫码');
                alert('支付宝扫码')
                imgTag.innerHTML = "<img src='https://cdn.jsdelivr.net/gh/smallfawn/Note@main/Images/clzfb.png'>";
                // TODO: 其他处理代码
            } else {
                // 其他浏览器的逻辑
                console.log('其他浏览器');
                //alert('其他浏览器')
                window.location.href = 'weixin://';

                // TODO: 其他处理代码
            }
        }

        // 调用扫码函数
        scanQRCode();
    </script>
</body>

</html>
